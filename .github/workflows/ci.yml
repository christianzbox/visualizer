name: Spectra CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: spectra-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package
        run: swift package resolve

      - name: Debug build
        run: swift build

      - name: Release build
        run: swift build -c release

      - name: Unit tests
        run: swift test

      - name: Diagnostics
        run: swift run SpectraDiagnostics

      - name: Package description
        run: swift package describe

      - name: Summary
        if: success()
        run: |
          {
            echo "## Spectra CI passed"
            echo ""
            echo "- Package resolution: passed"
            echo "- Debug build: passed"
            echo "- Release build: passed"
            echo "- Unit tests: passed"
            echo "- Diagnostics: passed"
            echo "- Package description: passed"
          } >> "$GITHUB_STEP_SUMMARY"
