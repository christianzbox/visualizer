name: Spectra CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: spectra-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package
        run: swift package resolve

      - name: Debug build
        run: swift build

      - name: Release build
        run: swift build -c release

      - name: Unit tests
        run: swift test

      - name: Diagnostics
        run: swift run SpectraDiagnostics

      - name: Package description
        run: swift package describe
