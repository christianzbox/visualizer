name: Spectra CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: spectra-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package
        run: swift package resolve

      - name: Debug build
        run: swift build

      - name: Release build
        run: swift build -c release

      - name: Verify XCTest discovery
        run: |
          TEST_LIST="$(swift test list)"
          printf '%s\n' "$TEST_LIST"
          TEST_COUNT="$(printf '%s\n' "$TEST_LIST" | grep -c '^SpectraTests\.' || true)"
          if [ "$TEST_COUNT" -lt 20 ]; then
            echo "::error::Expected at least 20 XCTest cases, found $TEST_COUNT"
            exit 1
          fi

      - name: Unit tests
        run: swift test

      - name: Diagnostics
        run: swift run SpectraDiagnostics

      - name: Package description
        run: swift package describe

      - name: Summary
        if: success()
        run: |
          {
            echo "## Spectra CI passed"
            echo ""
            echo "- Package resolution: passed"
            echo "- Debug build: passed"
            echo "- Release build: passed"
            echo "- Unit tests: passed"
            echo "- Diagnostics: passed"
            echo "- Package description: passed"
          } >> "$GITHUB_STEP_SUMMARY"
